version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: otopart-postgres
    environment:
      POSTGRES_DB: otopart_db
      POSTGRES_USER: otopart
      POSTGRES_PASSWORD: otopart123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: otopart-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: otopart-app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: otopart
      DB_PASSWORD: otopart123
      REDIS_HOST: redis
      JWT_SECRET: change-this-in-production-min32chars!!
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    profiles:
      - full  # sadece docker ile çalıştırmak isteyenler için

volumes:
  postgres_data:
